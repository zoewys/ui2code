name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify MCP server
        run: npm run test:mcp

      - name: Build DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/build-dmg.sh "$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "dist/UI2Code-$VERSION.dmg" \
            --title "UI2Code $GITHUB_REF_NAME" \
            --notes "DMG 安装包见附件。打开后运行 Install UI2Code.command。"
